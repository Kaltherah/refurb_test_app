name: Compile iOS Test App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fetch Dependencies
        run: flutter pub get

      - name: Compile iOS Simulator Framework Bundle
        run: flutter build ios --simulator

      - name: Package Simulation Payload into IPA Structure
        run: |
          mkdir -p Payload
          cp -r build/ios/iphonesimulator/Runner.app Payload/
          zip -vr AppPayload.ipa Payload/

      - name: Upload Finished Installer
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-ios-app
          path: AppPayload.ipa